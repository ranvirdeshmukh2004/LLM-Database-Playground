# ═══════════════════════════════════════════════════════════════
# Nginx — Both Modes (Supabase + Plain PG)
# Routes to the correct backend based on X-DB-Mode header
# Default: supabase backend
# ═══════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Select upstream based on X-DB-Mode header
map $http_x_db_mode $backend {
    "plain"  "app-backend-plain:7861";
    default  "app-backend-supabase:7860";
}

upstream app_backend_supabase {
    server app-backend-supabase:7860;
}

upstream app_backend_plain {
    server app-backend-plain:7861;
}

upstream supabase_kong {
    server supabase-kong:8000;
}

upstream supabase_studio {
    server supabase-studio:3000;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── API routes — route based on X-DB-Mode header ─────────
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        limit_req zone=api burst=50 nodelay;

        # Route to correct backend based on header
        set $target app_backend_supabase;
        if ($http_x_db_mode = "plain") {
            set $target app_backend_plain;
        }
        proxy_pass http://$target;
    }

    # ── Health endpoint — route based on header too ──────────
    location /health {
        set $target app_backend_supabase;
        if ($http_x_db_mode = "plain") {
            set $target app_backend_plain;
        }
        proxy_pass http://$target;
        proxy_set_header Host $host;
    }

    # ── Frontend static files — serve from supabase backend (same files) ──
    location / {
        proxy_pass http://app_backend_supabase;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # ── Supabase API Gateway ─────────────────────────────────
    location /supabase/ {
        rewrite ^/supabase/(.*) /$1 break;
        proxy_pass http://supabase_kong;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # ── Supabase Studio ──────────────────────────────────────
    location /studio/ {
        rewrite ^/studio/(.*) /$1 break;
        proxy_pass http://supabase_studio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health check ─────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
