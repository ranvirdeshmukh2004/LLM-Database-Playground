# ═══════════════════════════════════════════════════════════════
# Nginx Reverse Proxy — AI Agent Platform
# Routes:
#   /              → FastAPI backend (frontend + API)
#   /supabase/     → Supabase Kong gateway
#   /studio/       → Supabase Studio (restricted)
# ═══════════════════════════════════════════════════════════════

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

upstream app_backend {
    server app-backend:7860;
}

upstream supabase_kong {
    server supabase-kong:8000;
}

upstream supabase_studio {
    server supabase-studio:3000;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── App Backend (Frontend + API) ─────────────────────────
    location / {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (critical for streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Rate limiting for API endpoints
        limit_req zone=api burst=50 nodelay;
    }

    # ── Supabase API Gateway ─────────────────────────────────
    location /supabase/ {
        rewrite ^/supabase/(.*) /$1 break;
        proxy_pass http://supabase_kong;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # ── Supabase Studio (admin only) ─────────────────────────
    location /studio/ {
        # Restrict to admin IPs in production
        # allow YOUR_IP;
        # deny all;

        rewrite ^/studio/(.*) /$1 break;
        proxy_pass http://supabase_studio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health check ─────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
