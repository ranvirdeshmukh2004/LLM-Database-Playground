# ═══════════════════════════════════════════════════════════════
# MVP AI Agent Platform — Docker Compose
# Self-hosted Supabase + FastAPI Backend + Nginx
#
# Usage:
#   1. bash scripts/generate_keys.sh > .env
#   2. docker compose up -d
#   3. Open http://localhost (or your domain)
# ═══════════════════════════════════════════════════════════════

name: ai-agent-platform

services:
  # ────────────────────────────────────────────────────────────
  # PostgreSQL — Core database (Supabase-enhanced)
  # ────────────────────────────────────────────────────────────
  supabase-db:
    image: supabase/postgres:15.6.1.146
    container_name: supabase-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    command:
      - postgres
      - -c
      - listen_addresses=*
      - -c
      - wal_level=logical
      - -c
      - max_connections=100
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=8MB
      - -c
      - app.settings.postgres_password=${POSTGRES_PASSWORD}
    networks:
      - app-network

  # ────────────────────────────────────────────────────────────
  # Supabase Auth (GoTrue) — User authentication
  # ────────────────────────────────────────────────────────────
  supabase-auth:
    image: supabase/gotrue:v2.186.0
    container_name: supabase-auth
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL:-http://localhost:7860}
      GOTRUE_URI_ALLOW_LIST: ${GOTRUE_URI_ALLOW_LIST:-}
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${GOTRUE_EXTERNAL_EMAIL_ENABLED:-true}
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-true}
      GOTRUE_SMS_AUTOCONFIRM: ${GOTRUE_SMS_AUTOCONFIRM:-true}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_RECOVERY: "/auth/v1/recover"
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: "/auth/v1/verify"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ────────────────────────────────────────────────────────────
  # Supabase REST (PostgREST) — Auto-generate REST API
  # ────────────────────────────────────────────────────────────
  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    container_name: supabase-rest
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ────────────────────────────────────────────────────────────
  # Supabase Realtime — WebSocket subscriptions
  # ────────────────────────────────────────────────────────────
  supabase-realtime:
    image: supabase/realtime:v2.33.58
    container_name: supabase-realtime
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${JWT_SECRET}${JWT_SECRET}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ────────────────────────────────────────────────────────────
  # Supabase Storage — File storage (S3-compatible)
  # ────────────────────────────────────────────────────────────
  supabase-storage:
    image: supabase/storage-api:v1.14.3
    container_name: supabase-storage
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: ap-south-1
      GLOBAL_S3_BUCKET: stub
      IS_MULTITENANT: "false"
    volumes:
      - storage-data:/var/lib/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ────────────────────────────────────────────────────────────
  # Supabase Meta — Table metadata for Studio
  # ────────────────────────────────────────────────────────────
  supabase-meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: supabase-meta
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - app-network

  # ────────────────────────────────────────────────────────────
  # Supabase Kong — API Gateway (routes /auth, /rest, etc.)
  # ────────────────────────────────────────────────────────────
  supabase-kong:
    image: kong/kong:3.9.1
    container_name: supabase-kong
    restart: unless-stopped
    depends_on:
      supabase-auth:
        condition: service_started
      supabase-rest:
        condition: service_started
    ports:
      - "8080:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./docker/kong.yml:/usr/local/kong/kong.yml:ro
    networks:
      - app-network

  # ────────────────────────────────────────────────────────────
  # Supabase Studio — Admin Dashboard
  # ────────────────────────────────────────────────────────────
  supabase-studio:
    image: supabase/studio:20241202-71e5240
    container_name: supabase-studio
    restart: unless-stopped
    depends_on:
      supabase-kong:
        condition: service_started
    ports:
      - "127.0.0.1:${STUDIO_PORT:-3001}:3000"
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-AI Platform}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-MVP AI Agent Platform}
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    networks:
      - app-network

  # ────────────────────────────────────────────────────────────
  # App Backend — Our FastAPI application
  # ────────────────────────────────────────────────────────────
  app-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-backend
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-auth:
        condition: service_healthy
    ports:
      - "127.0.0.1:7860:7860"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=supabase-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - JWT_SECRET=${JWT_SECRET}
      - ANON_KEY=${ANON_KEY}
      - SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}
      - SUPABASE_URL=http://supabase-kong:8000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - APP_SECRET_KEY=${APP_SECRET_KEY}
      - APP_HOST=0.0.0.0
      - APP_PORT=7860
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./app:/app/app:ro
      - ./frontend:/app/frontend:ro
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7860/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ────────────────────────────────────────────────────────────
  # Nginx — Reverse Proxy + SSL Termination
  # ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    depends_on:
      app-backend:
        condition: service_started
      supabase-kong:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-certs:/etc/nginx/certs
    networks:
      - app-network

# ────────────────────────────────────────────────────────────
# Volumes
# ────────────────────────────────────────────────────────────
volumes:
  db-data:
    driver: local
  storage-data:
    driver: local
  app-logs:
    driver: local
  nginx-certs:
    driver: local

# ────────────────────────────────────────────────────────────
# Network
# ────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
