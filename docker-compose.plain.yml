# ═══════════════════════════════════════════════════════════════
# AI Agent Platform — Plain PostgreSQL Mode
#
# Only 3 services: PostgreSQL, FastAPI, Nginx
# No Supabase (GoTrue, Kong, Studio, etc.)
# Auth is handled by the app itself (bcrypt + self-signed JWTs)
#
# Usage:
#   1. bash scripts/generate_keys.sh > .env
#   2. echo "DB_MODE=plain" >> .env
#   3. docker compose -f docker-compose.plain.yml up -d
#   4. Open http://localhost
# ═══════════════════════════════════════════════════════════════

name: ai-agent-platform-plain

services:
  # ────────────────────────────────────────────────────────────
  # PostgreSQL — Plain vanilla (no Supabase extensions)
  # ────────────────────────────────────────────────────────────
  plain-db:
    image: postgres:15-alpine
    container_name: plain-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    volumes:
      - plain-db-data:/var/lib/postgresql/data
      - ./db/plain-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    command:
      - postgres
      - -c
      - listen_addresses=*
      - -c
      - max_connections=100
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=8MB
    networks:
      - app-network

  # ────────────────────────────────────────────────────────────
  # App Backend — FastAPI (DB_MODE=plain)
  # ────────────────────────────────────────────────────────────
  app-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-backend
    restart: unless-stopped
    depends_on:
      plain-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:7860:7860"
    environment:
      - DB_MODE=plain
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=plain-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - APP_SECRET_KEY=${APP_SECRET_KEY}
      - APP_HOST=0.0.0.0
      - APP_PORT=7860
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./app:/app/app:ro
      - ./frontend:/app/frontend:ro
      - plain-app-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7860/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ────────────────────────────────────────────────────────────
  # Nginx — Reverse Proxy
  # ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    depends_on:
      app-backend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-plain.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

# ────────────────────────────────────────────────────────────
# Volumes
# ────────────────────────────────────────────────────────────
volumes:
  plain-db-data:
    driver: local
  plain-app-logs:
    driver: local

# ────────────────────────────────────────────────────────────
# Network
# ────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
